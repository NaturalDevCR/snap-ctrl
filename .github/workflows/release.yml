name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Build HA addon
        run: pnpm run build:ha

      - name: Zip dist folders
        run: |
          zip -r dist.zip dist
          cd addon && zip -r ../dist-ha.zip dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.zip
            dist-ha.zip
          generate_release_notes: true
