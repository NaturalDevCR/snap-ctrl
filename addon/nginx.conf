worker_processes 1;
error_log /dev/stdout warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml
        font/woff2
        font/ttf;

    server {
        listen __UI_PORT__;
        root /var/www/html;
        index index.html;

        # Security headers. The CSP is also set via a <meta> tag in index.html,
        # but frame-ancestors is only honored when delivered as a response header,
        # so the full policy (including frame-ancestors) must be sent here.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' blob:; connect-src 'self' ws: wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'self';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proxy Snapcast JSON-RPC WebSocket to avoid mixed-content (WSS→WS) issues
        location /jsonrpc {
            proxy_pass http://SNAPCAST_UPSTREAM/jsonrpc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
